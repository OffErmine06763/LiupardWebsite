	<section>
		<h1 class="hero">I fiati</h1>

		<div class="gallery">
			<figure class="item">
				<img src="res/leopardi/LIVIO.jpg" alt="">
				<figcaption>
					LIVIO al sax baritono<br>
					Livio Bolis, raffinato<br>
					conoscitore di musica R&B
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/BONDO.jpg" alt="">
				<figcaption>
					BONDO al trombone<br>
					Roberto Bondoni, mitico arrangiatore<br>
					e fondatore della band nel 1989
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/DARIS.jpg" alt="">
				<figcaption>
					DARIS al sax contralto<br>
					Daris Pasotti, anima allegra<br>
					e armonizzante del soul
				</figcaption>
			</figure>
		</div>
		<div class="gallery">
			<figure class="item">
				<img src="res/leopardi/IVO.jpg" alt="">
				<figcaption>
					IVO (ora) al sax soprano<br>
					Ivo Saputo, l'eleganza e l'ironia<br>
					nella precisione
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/SERGHEY.jpg" alt="">
				<figcaption>
					SERGHEY alla tromba<br>
					Sergio Ravani, leggendario<br>
					cantastorie della tradizione
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/ZERBI.jpg" alt="">
				<figcaption>
					ZERBI al sax tenore<br>
					Marco Erbi, analista brillante<br>
					di ogni situazione
				</figcaption>
			</figure>
		</div>
	</section>
	
	<section>
		<h1 class="hero">La ritmica</h1>

		<div class="gallery">
			<figure class="item">
				<img src="res/leopardi/BEPPE.jpg" alt="">
				<figcaption>
					BEPPE alla chitarra<br>
					Giuseppe Tavoldini, la tecnica<br>
					nella brillante versatilità
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/LAMBERT.jpg" alt="">
				<figcaption>
					LAMBERT al basso<br>
					Lamberto Penocchio, virtuoso<br>
					professionista del tempo
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/PIETRA.jpg" alt="">
				<figcaption>
					PIETRA alla chitarra<br>
					Fulvio Zubani, catalizzatore<br>
					di gioia e di energia
				</figcaption>
			</figure>
		</div>
		<div class="gallery max2">
			<figure class="item">
				<img src="res/leopardi/MANU.jpg" alt="">
				<figcaption>
					MANU alle testiere<br>
					Emanuele Mossoni, generatore di<br>
					suggestioni discrete ma argute
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/LUCA.jpg" alt="">
				<figcaption>
					LUCA alla batteria<br>
					Luca Bonomi, vitalità e<br>
					ingegno al servizio del ritmo
				</figcaption>
			</figure>
		</div>
	</section>

		<h1 class="hero">Le voci</h1>

		<div class="gallery">
			<figure class="item">
				<img src="res/leopardi/ALBO.jpg" alt="">

					ALBO<br>
					Alberto Zani, l'intensità<br>
					appassionata e al contempo burlona  
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/CAMY.jpg" alt="">
				<figcaption>
					CAMY<br>
					Camilla Saleri, il timbro profondo<br>
					e suadente accordato alla bellezza
				</figcaption>
			</figure>
			<figure class="item">
				<img src="res/leopardi/SPANKY.jpg" alt="">
				<figcaption>
					SPANKY<br>
					Stefano Boschi, il giusto graffio<br>
					combinato a carisma e simpatia
				</figcaption>
			</figure>
		</div>
	</section>
